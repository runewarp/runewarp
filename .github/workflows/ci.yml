name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  RUST_DEPENDENCY_CACHE_PATHS: |
    ~/.cargo/registry/index/
    ~/.cargo/registry/cache/
    ~/.cargo/registry/src/
    ~/.cargo/git/db/
    ~/.cargo/git/checkouts/
  TRUSTED_MAIN_DOCKER_CACHE_FROM: type=gha,scope=main-docker
  TRUSTED_MAIN_DOCKER_CACHE_TO: type=gha,scope=main-docker,mode=max

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint workflows
        run: ./scripts/lint-workflows

  automation-contract:
    name: Automation contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate release metadata
        run: ./scripts/validate-release-metadata ci

      - name: Run Ruby automation tests
        run: ./scripts/test-automation

  install-path-linux:
    name: Install path (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUNEWARP_BUILD_COMMIT: ${{ github.sha }}
      RUST_CACHE_SCOPE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'trusted-main' }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Rust build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ env.RUST_DEPENDENCY_CACHE_PATHS }}
            target/
          key: ${{ runner.os }}-rust-ci-${{ env.RUST_CACHE_SCOPE }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-ci-${{ env.RUST_CACHE_SCOPE }}-

      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Check Linux cargo install path
        run: |
          ./scripts/check-distribution cargo-install \
            --bin-name runewarp \
            --probe-arg --help \
            --expected-text "Usage: runewarp"

  install-path-macos:
    name: Install path (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      RUNEWARP_BUILD_COMMIT: ${{ github.sha }}
      RUST_CACHE_SCOPE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'trusted-main' }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Rust build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ env.RUST_DEPENDENCY_CACHE_PATHS }}
            target/
          key: ${{ runner.os }}-rust-ci-${{ env.RUST_CACHE_SCOPE }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-ci-${{ env.RUST_CACHE_SCOPE }}-

      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Check macOS cargo install path
        run: |
          ./scripts/check-distribution cargo-install \
            --bin-name runewarp \
            --probe-arg --help \
            --expected-text "Usage: runewarp"

  package-readiness:
    name: Package readiness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUNEWARP_BUILD_COMMIT: ${{ github.sha }}
      RUST_CACHE_SCOPE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'trusted-main' }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Rust build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ env.RUST_DEPENDENCY_CACHE_PATHS }}
            target/
          key: ${{ runner.os }}-rust-ci-${{ env.RUST_CACHE_SCOPE }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-ci-${{ env.RUST_CACHE_SCOPE }}-

      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Check package readiness
        run: ./scripts/check-distribution package-readiness

  rust-contract:
    name: Rust contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUNEWARP_BUILD_COMMIT: ${{ github.sha }}
      RUST_CACHE_SCOPE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'trusted-main' }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Rust build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ env.RUST_DEPENDENCY_CACHE_PATHS }}
            target/
          key: ${{ runner.os }}-rust-ci-${{ env.RUST_CACHE_SCOPE }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-ci-${{ env.RUST_CACHE_SCOPE }}-

      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable --component clippy,rustfmt
          rustup default stable

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --quiet

      - name: Build documentation
        run: cargo doc --no-deps

  docker-contract:
    name: Docker contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUNEWARP_DOCKER_BUILD_FLAGS: ${{ github.event_name == 'pull_request' && format('--cache-from type=gha,scope=pr-{0}-docker --cache-to type=gha,scope=pr-{0}-docker,mode=max', github.event.pull_request.number) || '--cache-from type=gha,scope=main-docker --cache-to type=gha,scope=main-docker,mode=max' }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Check Docker image path
        run: |
          ./scripts/check-distribution docker-image \
            --probe-arg --help \
            --expected-text "Usage: runewarp" \
            --image-tag runewarp:ci

      - name: Run Docker example smoke
        run: ./scripts/docker-example smoke

  ci:
    name: CI
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - workflow-lint
      - automation-contract
      - install-path-linux
      - install-path-macos
      - package-readiness
      - rust-contract
      - docker-contract
    steps:
      - name: Enforce aggregate success
        env:
          WORKFLOW_LINT_RESULT: ${{ needs.workflow-lint.result }}
          AUTOMATION_CONTRACT_RESULT: ${{ needs.automation-contract.result }}
          INSTALL_PATH_LINUX_RESULT: ${{ needs.install-path-linux.result }}
          INSTALL_PATH_MACOS_RESULT: ${{ needs.install-path-macos.result }}
          PACKAGE_READINESS_RESULT: ${{ needs.package-readiness.result }}
          RUST_CONTRACT_RESULT: ${{ needs.rust-contract.result }}
          DOCKER_CONTRACT_RESULT: ${{ needs.docker-contract.result }}
        run: |
          for check in \
            "workflow-lint:$WORKFLOW_LINT_RESULT" \
            "automation-contract:$AUTOMATION_CONTRACT_RESULT" \
            "install-path-linux:$INSTALL_PATH_LINUX_RESULT" \
            "install-path-macos:$INSTALL_PATH_MACOS_RESULT" \
            "package-readiness:$PACKAGE_READINESS_RESULT" \
            "rust-contract:$RUST_CONTRACT_RESULT" \
            "docker-contract:$DOCKER_CONTRACT_RESULT"; do
            name="${check%%:*}"
            result="${check#*:}"
            if [[ "$result" != "success" ]]; then
              printf 'error: required job %s finished with %s\n' "$name" "$result" >&2
              exit 1
            fi
          done
