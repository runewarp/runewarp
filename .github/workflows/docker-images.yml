name: Docker images

on:
  workflow_dispatch:

jobs:
  docker-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    env:
      OUTPUT_DIR: target/docker-images
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Compute artifact identity
        run: |
          . ./scripts/lib.sh
          version="$(runewarp_version "$PWD")"
          commit="$(runewarp_git_commit "$PWD")"
          printf 'RUNEWARP_GIT_COMMIT=%s\n' "$commit" >> "$GITHUB_ENV"
          printf 'RUNEWARP_ARTIFACT_PREFIX=runewarp-v%s-%s\n' "$version" "$commit" >> "$GITHUB_ENV"

      - name: Export linux/amd64 OCI image
        run: ./scripts/docker-image.sh linux/amd64 "$OUTPUT_DIR"

      - name: Export linux/arm64 OCI image
        run: ./scripts/docker-image.sh linux/arm64 "$OUTPUT_DIR"

      - name: Upload OCI image artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.RUNEWARP_ARTIFACT_PREFIX }}-oci-images
          path: ${{ env.OUTPUT_DIR }}/*.oci.tar
