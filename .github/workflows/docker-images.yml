name: Docker images

on:
  workflow_dispatch:

jobs:
  docker-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OUTPUT_DIR: target/docker-images
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute artifact identity
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          commit="$(git rev-parse --short=12 HEAD)"
          echo "RUNEWARP_GIT_COMMIT=$commit" >> "$GITHUB_ENV"
          echo "RUNEWARP_ARTIFACT_PREFIX=runewarp-v${version}-${commit}" >> "$GITHUB_ENV"

      - name: Export linux/amd64 OCI image
        run: ./scripts/export-oci-image.sh linux/amd64 "$OUTPUT_DIR"

      - name: Export linux/arm64 OCI image
        run: ./scripts/export-oci-image.sh linux/arm64 "$OUTPUT_DIR"

      - name: Upload OCI image artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.RUNEWARP_ARTIFACT_PREFIX }}-oci-images
          path: ${{ env.OUTPUT_DIR }}/*.oci.tar
