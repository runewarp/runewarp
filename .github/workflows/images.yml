name: Images

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: images-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Docker Hub images
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate main-image metadata
        run: ./scripts/validate-release-metadata images

      - name: Derive main-image refs
        env:
          IMAGE_REPOSITORY: docker.io/runewarp/runewarp
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          commit_tag="$(printf '%s' "$HEAD_SHA" | cut -c1-12)"
          {
            printf 'IMAGE_REPOSITORY=%s\n' "$IMAGE_REPOSITORY"
            printf 'COMMIT_TAG=%s\n' "$commit_tag"
            printf 'COMMIT_IMAGE_REF=%s:%s\n' "$IMAGE_REPOSITORY" "$commit_tag"
            printf 'MAIN_IMAGE_REF=%s:main\n' "$IMAGE_REPOSITORY"
          } >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ !cancelled() }}
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Publish trusted main image lineage
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            RUNEWARP_BUILD_COMMIT=${{ github.event.workflow_run.head_sha }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.MAIN_IMAGE_REF }}
            ${{ env.COMMIT_IMAGE_REF }}
          provenance: mode=max

      - name: Smoke published image startup
        run: |
          ./scripts/check-distribution docker-registry-image \
            --image-ref "$COMMIT_IMAGE_REF" \
            --platform linux/amd64 \
            --expected-text "runewarp" \
            --probe-arg --version

  smoke-amd64:
    name: Smoke published amd64 image
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    needs:
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Derive main-image refs
        env:
          IMAGE_REPOSITORY: docker.io/runewarp/runewarp
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          commit_tag="$(printf '%s' "$HEAD_SHA" | cut -c1-12)"
          {
            printf 'COMMIT_IMAGE_REF=%s:%s\n' "$IMAGE_REPOSITORY" "$commit_tag"
          } >> "$GITHUB_ENV"

      - name: Smoke published image startup
        run: |
          ./scripts/check-distribution docker-registry-image \
            --image-ref "$COMMIT_IMAGE_REF" \
            --platform linux/amd64 \
            --expected-text "runewarp" \
            --probe-arg --version

      - name: Smoke published Docker example
        run: ./scripts/docker-example smoke --image-ref "$COMMIT_IMAGE_REF"

  smoke-arm64:
    name: Smoke published arm64 image
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    needs:
      - publish
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Derive main-image refs
        env:
          IMAGE_REPOSITORY: docker.io/runewarp/runewarp
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          commit_tag="$(printf '%s' "$HEAD_SHA" | cut -c1-12)"
          {
            printf 'COMMIT_IMAGE_REF=%s:%s\n' "$IMAGE_REPOSITORY" "$commit_tag"
          } >> "$GITHUB_ENV"

      - name: Smoke published image startup
        run: |
          ./scripts/check-distribution docker-registry-image \
            --image-ref "$COMMIT_IMAGE_REF" \
            --platform linux/arm64 \
            --expected-text "runewarp" \
            --probe-arg --version

      - name: Smoke published Docker example
        run: ./scripts/docker-example smoke --image-ref "$COMMIT_IMAGE_REF"
