name: Release preview build

on:
  workflow_dispatch:

jobs:
  release-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OUTPUT_DIR: target/release-preview
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install the Linux cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Compute artifact identity
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          commit="$(git rev-parse --short=12 HEAD)"
          echo "RUNEWARP_GIT_COMMIT=$commit" >> "$GITHUB_ENV"
          echo "RUNEWARP_ARTIFACT_PREFIX=runewarp-v${version}-${commit}" >> "$GITHUB_ENV"

      - name: Package x86_64 GNU build
        run: ./scripts/package-linux-release.sh x86_64-unknown-linux-gnu "$OUTPUT_DIR"

      - name: Package aarch64 GNU build
        env:
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: ./scripts/package-linux-release.sh aarch64-unknown-linux-gnu "$OUTPUT_DIR"

      - name: Validate cargo publish dry-run
        run: cargo publish --dry-run --locked 2>&1 | tee "$OUTPUT_DIR/cargo-publish-dry-run.txt"

      - name: Export linux/amd64 OCI image
        run: ./scripts/export-oci-image.sh linux/amd64 "$OUTPUT_DIR"

      - name: Export linux/arm64 OCI image
        run: ./scripts/export-oci-image.sh linux/arm64 "$OUTPUT_DIR"

      - name: Upload preview release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RUNEWARP_ARTIFACT_PREFIX }}-linux-release-preview
          path: ${{ env.OUTPUT_DIR }}/
