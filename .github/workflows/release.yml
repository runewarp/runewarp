name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: Release path to run
        required: true
        type: choice
        options:
          - rehearsal
          - publish
      release_tag:
        description: Stable release tag, in vX.Y.Z form
        required: true
        type: string

permissions:
  contents: read
  checks: read

env:
  RUST_DEPENDENCY_CACHE_PATHS: |
    ~/.cargo/registry/index/
    ~/.cargo/registry/cache/
    ~/.cargo/registry/src/
    ~/.cargo/git/db/
    ~/.cargo/git/checkouts/

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Release gate
    runs-on: ubuntu-26.04
    timeout-minutes: 15
    outputs:
      workflow_mode: ${{ steps.release-metadata.outputs.workflow_mode }}
      release_tag: ${{ steps.release-metadata.outputs.release_tag }}
      release_version: ${{ steps.release-metadata.outputs.release_version }}
      release_source_ref: ${{ steps.release-metadata.outputs.release_source_ref }}
      release_commit: ${{ steps.release-source.outputs.release_commit }}
      image_repository: ${{ steps.release-metadata.outputs.image_repository }}
      primary_image_ref: ${{ steps.release-lineage.outputs.primary_image_ref }}
      source_image_ref: ${{ steps.release-lineage.outputs.source_image_ref }}
      docker_tags: ${{ steps.release-metadata.outputs.docker_tags }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.ref }}

      - name: Resolve release metadata
        id: release-metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          WORKFLOW_MODE: ${{ inputs.mode }}
          WORKFLOW_TAG: ${{ inputs.release_tag }}
          IMAGE_REPOSITORY: docker.io/runewarp/runewarp
        run: ./scripts/resolve-release-metadata

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: release-source
          ref: ${{ steps.release-metadata.outputs.release_source_ref }}

      - name: Resolve release source commit
        id: release-source
        run: printf 'release_commit=%s\n' "$(git -C "$PWD/release-source" rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve release image lineage
        id: release-lineage
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          WORKFLOW_MODE: ${{ inputs.mode }}
          WORKFLOW_TAG: ${{ inputs.release_tag }}
          IMAGE_REPOSITORY: docker.io/runewarp/runewarp
          RELEASE_COMMIT: ${{ steps.release-source.outputs.release_commit }}
        run: ./scripts/resolve-release-metadata

      - name: Validate rehearsal release gate
        if: steps.release-metadata.outputs.workflow_mode == 'rehearsal'
        run: ./scripts/validate-release-gates rehearsal --repo-root "$PWD/release-source" --tag "$RELEASE_TAG"

      - name: Validate signed release tag
        if: steps.release-metadata.outputs.workflow_mode == 'publish'
        run: ./scripts/validate-release-gates tag --repo-root "$PWD" --metadata-repo-root "$PWD/release-source" --tag "$RELEASE_TAG" --allowed-signers-file "$PWD/.github/release-allowed-signers"

      - name: Verify prior green CI
        if: steps.release-metadata.outputs.workflow_mode == 'publish'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ steps.release-source.outputs.release_commit }}
        run: ./scripts/check-github-check-run

      - name: Verify prior successful Images workflow
        if: steps.release-metadata.outputs.workflow_mode == 'publish'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ steps.release-source.outputs.release_commit }}
          CHECK_NAME: Images
        run: ./scripts/check-github-check-run

      - name: Render release notes preview
        run: ./scripts/render-release-notes --version "$RELEASE_VERSION" > /tmp/release-notes.md

      - name: Summarize release gate
        env:
          RELEASE_COMMIT: ${{ steps.release-source.outputs.release_commit }}
          RELEASE_NOTES_PATH: /tmp/release-notes.md
        run: ./scripts/write-release-summary

  crate-release:
    name: Publish crates.io release
    needs:
      - gate
    runs-on: ubuntu-26.04
    timeout-minutes: 45
    environment: release
    permissions:
      contents: read
    env:
      RUST_CACHE_SCOPE: ${{ format('release-{0}', needs.gate.outputs.release_tag) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.ref }}

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: release-source
          ref: ${{ needs.gate.outputs.release_source_ref }}

      - name: Restore Rust build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ env.RUST_DEPENDENCY_CACHE_PATHS }}
            release-source/target/
          key: ${{ runner.os }}-rust-release-${{ env.RUST_CACHE_SCOPE }}-${{ hashFiles('release-source/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-release-${{ env.RUST_CACHE_SCOPE }}-

      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Check whether crates.io version already exists
        id: crate-status
        env:
          CRATE_NAME: runewarp
          RELEASE_VERSION: ${{ needs.gate.outputs.release_version }}
        run: ./scripts/check-crates-io-release

      - name: Publish crate to crates.io
        if: (github.event_name != 'workflow_dispatch' || inputs.mode == 'publish') && steps.crate-status.outputs.exists != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "5"
        run: cargo publish --locked --manifest-path release-source/Cargo.toml

      - name: Rehearse crate publish
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'rehearsal'
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "5"
        run: cargo publish --dry-run --locked --manifest-path release-source/Cargo.toml

  docker-release:
    name: Promote Docker Hub release tags
    if: github.event_name == 'push' || inputs.mode == 'publish'
    needs:
      - gate
      - crate-release
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.ref }}

      - name: Set up Docker Buildx
        if: ${{ !cancelled() }}
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Check whether Docker release already exists
        id: docker-status
        env:
          PRIMARY_IMAGE_REF: ${{ needs.gate.outputs.primary_image_ref }}
        run: ./scripts/check-docker-hub-tag --image-ref "$PRIMARY_IMAGE_REF"

      - name: Check whether source image exists
        id: source-image-status
        if: steps.docker-status.outputs.exists != 'true'
        env:
          SOURCE_IMAGE_REF: ${{ needs.gate.outputs.source_image_ref }}
        run: ./scripts/check-docker-hub-tag --image-ref "$SOURCE_IMAGE_REF"

      - name: Assert source image lineage is available
        if: steps.docker-status.outputs.exists != 'true' && steps.source-image-status.outputs.exists != 'true'
        env:
          SOURCE_IMAGE_REF: ${{ needs.gate.outputs.source_image_ref }}
        run: |
          printf 'error: source image lineage %s is missing\n' "$SOURCE_IMAGE_REF" >&2
          exit 1

      - name: Verify source image lineage matches the release commit
        if: steps.docker-status.outputs.exists != 'true'
        env:
          SOURCE_IMAGE_REF: ${{ needs.gate.outputs.source_image_ref }}
          SOURCE_IMAGE_COMMIT: ${{ needs.gate.outputs.release_commit }}
        run: |
          expected_commit_tag="$(printf '%s' "$SOURCE_IMAGE_COMMIT" | cut -c1-12)"
          ./scripts/check-distribution docker-registry-image \
            --image-ref "$SOURCE_IMAGE_REF" \
            --platform linux/amd64 \
            --expected-text "$expected_commit_tag" \
            --probe-arg --version

      - name: Log in to Docker Hub
        if: steps.docker-status.outputs.exists != 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Merge manifest
        if: steps.docker-status.outputs.exists != 'true'
        id: merge-manifest
        env:
          DOCKER_TAGS: ${{ needs.gate.outputs.docker_tags }}
          IMAGE_REPOSITORY: ${{ needs.gate.outputs.image_repository }}
          RELEASE_VERSION: ${{ needs.gate.outputs.release_version }}
          SOURCE_IMAGE_REF: ${{ needs.gate.outputs.source_image_ref }}
        run: ./scripts/merge-docker-manifest

      - name: Install cosign
        if: steps.docker-status.outputs.exists != 'true'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Sign released image
        if: steps.docker-status.outputs.exists != 'true'
        env:
          IMAGE_REPOSITORY: ${{ needs.gate.outputs.image_repository }}
          IMAGE_DIGEST: ${{ steps.merge-manifest.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"

  github-release:
    name: Finalize GitHub release
    if: github.event_name == 'push' || inputs.mode == 'publish'
    needs:
      - gate
      - crate-release
      - docker-release
    runs-on: ubuntu-26.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.ref }}

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: release-source
          ref: ${{ needs.gate.outputs.release_source_ref }}

      - name: Render release notes
        env:
          RELEASE_VERSION: ${{ needs.gate.outputs.release_version }}
        run: ./scripts/render-release-notes --version "$RELEASE_VERSION" > /tmp/release-notes.md

      - name: Upsert GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.gate.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.gate.outputs.release_version }}
          RELEASE_NOTES_PATH: /tmp/release-notes.md
          REPOSITORY: ${{ github.repository }}
        run: ./scripts/upsert-github-release
