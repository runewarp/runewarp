name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: Release path to run
        required: true
        type: choice
        options:
          - rehearsal
          - publish
      release_tag:
        description: Stable release tag, in vX.Y.Z form
        required: true
        type: string

permissions:
  contents: read
  checks: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      workflow_mode: ${{ steps.release-metadata.outputs.workflow_mode }}
      release_tag: ${{ steps.release-metadata.outputs.release_tag }}
      release_version: ${{ steps.release-metadata.outputs.release_version }}
      release_source_ref: ${{ steps.release-metadata.outputs.release_source_ref }}
      release_commit: ${{ steps.release-source.outputs.release_commit }}
      image_repository: ${{ steps.release-metadata.outputs.image_repository }}
      primary_image_ref: ${{ steps.release-metadata.outputs.primary_image_ref }}
      docker_tags: ${{ steps.release-metadata.outputs.docker_tags }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.ref }}

      - name: Resolve release metadata
        id: release-metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          WORKFLOW_MODE: ${{ inputs.mode }}
          WORKFLOW_TAG: ${{ inputs.release_tag }}
          IMAGE_REPOSITORY: docker.io/runewarp/runewarp
        run: ./scripts/resolve-release-metadata.sh

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: release-source
          ref: ${{ steps.release-metadata.outputs.release_source_ref }}

      - name: Resolve release source commit
        id: release-source
        run: printf 'release_commit=%s\n' "$(git -C "$PWD/release-source" rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate rehearsal release gate
        if: steps.release-metadata.outputs.workflow_mode == 'rehearsal'
        run: ./scripts/validate-release-gates.sh rehearsal --repo-root "$PWD/release-source" --tag "$RELEASE_TAG"

      - name: Validate signed release tag
        if: steps.release-metadata.outputs.workflow_mode == 'publish'
        run: ./scripts/validate-release-gates.sh tag --repo-root "$PWD" --metadata-repo-root "$PWD/release-source" --tag "$RELEASE_TAG" --allowed-signers-file "$PWD/.github/release-allowed-signers"

      - name: Verify prior green CI
        if: steps.release-metadata.outputs.workflow_mode == 'publish'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ steps.release-source.outputs.release_commit }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          repository = os.environ["REPOSITORY"]
          commit_sha = os.environ["COMMIT_SHA"]
          token = os.environ["GITHUB_TOKEN"]

          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/commits/{commit_sha}/check-runs?check_name=CI&filter=latest",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          try:
              with urllib.request.urlopen(request) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as error:
              print(
                  f"error: failed to query GitHub check runs for commit {commit_sha}: "
                  f"HTTP {error.code} {error.reason}",
                  file=sys.stderr,
              )
              sys.exit(1)
          except urllib.error.URLError as error:
              print(
                  f"error: failed to reach GitHub while checking CI for commit {commit_sha}: "
                  f"{error.reason}",
                  file=sys.stderr,
              )
              sys.exit(1)

          matches = [
              check_run
              for check_run in payload.get("check_runs", [])
              if check_run.get("name") == "CI"
          ]

          if not matches:
              print(
                  f"error: commit {commit_sha} does not have an aggregate CI check run",
                  file=sys.stderr,
              )
              sys.exit(1)

          if not any(check_run.get("conclusion") == "success" for check_run in matches):
              print(
                  f"error: aggregate CI check for commit {commit_sha} is not successful",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Render release notes preview
        run: ./scripts/render-release-notes.sh --version "${RELEASE_TAG#v}" > /tmp/release-notes.md

      - name: Summarize release gate
        run: |
          {
            printf '## Release workflow\n\n'
            printf -- '- Mode: %s\n' "$WORKFLOW_MODE"
            printf -- "- Release tag: \`%s\`\n" "$RELEASE_TAG"
            printf -- "- Release version: \`%s\`\n" "$RELEASE_VERSION"
            printf -- "- Workflow ref: \`%s\`\n" "$GITHUB_REF"
            printf -- "- Release source ref: \`%s\`\n" "$RELEASE_SOURCE_REF"
            printf -- "- Release commit: \`%s\`\n" "${{ steps.release-source.outputs.release_commit }}"
            printf -- '- Docker tags:'
            separator=' '
            while IFS= read -r tag; do
              [[ -n "$tag" ]] || continue
              printf -- '%s\`%s\`' "$separator" "${tag#${IMAGE_REPOSITORY}:}"
              separator=', '
            done <<< "$DOCKER_TAGS"
            printf '\n'
            printf '\n## Release notes preview\n\n'
          } >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/release-notes.md >> "$GITHUB_STEP_SUMMARY"

  crate-release:
    name: Publish crates.io release
    needs:
      - gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: release
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.ref }}

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: release-source
          ref: ${{ needs.gate.outputs.release_source_ref }}

      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Check whether crates.io version already exists
        id: crate-status
        if: github.event_name != 'workflow_dispatch' || inputs.mode == 'publish'
        env:
          CRATE_NAME: runewarp
          RELEASE_VERSION: ${{ needs.gate.outputs.release_version }}
        run: |
          python - <<'PY'
          import os
          import sys
          import urllib.error
          import urllib.request

          crate_name = os.environ["CRATE_NAME"]
          release_version = os.environ["RELEASE_VERSION"]
          output_path = os.environ["GITHUB_OUTPUT"]
          url = f"https://crates.io/api/v1/crates/{crate_name}/{release_version}"

          request = urllib.request.Request(
              url,
              headers={"Accept": "application/json"},
          )

          try:
              with urllib.request.urlopen(request):
                  exists = "true"
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  exists = "false"
              else:
                  print(
                      f"error: failed to query crates.io for {crate_name} {release_version}: "
                      f"HTTP {error.code} {error.reason}",
                      file=sys.stderr,
                  )
                  sys.exit(1)
          except urllib.error.URLError as error:
              print(
                  f"error: failed to reach crates.io for {crate_name} {release_version}: "
                  f"{error.reason}",
                  file=sys.stderr,
              )
              sys.exit(1)

          with open(output_path, "a", encoding="utf-8") as handle:
              handle.write(f"exists={exists}\n")
          PY

      - name: Publish crate to crates.io
        if: (github.event_name != 'workflow_dispatch' || inputs.mode == 'publish') && steps.crate-status.outputs.exists != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "5"
        run: cargo publish --locked --manifest-path release-source/Cargo.toml

      - name: Rehearse crate publish
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'rehearsal'
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "5"
        run: cargo publish --dry-run --locked --manifest-path release-source/Cargo.toml

  docker-release-amd64:
    name: Publish Docker Hub amd64 release
    needs:
      - gate
      - crate-release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    permissions:
      contents: read
    outputs:
      docker_exists: ${{ steps.docker-status.outputs.exists }}
      image_digest: ${{ steps.build-image.outputs.digest }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.ref }}

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: release-source
          ref: ${{ needs.gate.outputs.release_source_ref }}

      - name: Set up Docker Buildx
        if: ${{ !cancelled() }}
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Check whether Docker release already exists
        id: docker-status
        if: github.event_name != 'workflow_dispatch' || inputs.mode == 'publish'
        env:
          RELEASE_VERSION: ${{ needs.gate.outputs.release_version }}
        run: |
          status_code="$(
            curl \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out '%{http_code}' \
              "https://hub.docker.com/v2/namespaces/runewarp/repositories/runewarp/tags/${RELEASE_VERSION}"
          )"
          case "$status_code" in
            200)
              printf 'exists=true\n' >> "$GITHUB_OUTPUT"
              ;;
            404)
              printf 'exists=false\n' >> "$GITHUB_OUTPUT"
              ;;
            *)
              printf 'error: failed to query Docker Hub tag %s: HTTP %s\n' "$RELEASE_VERSION" "$status_code" >&2
              exit 1
              ;;
          esac

      - name: Log in to Docker Hub
        if: (github.event_name != 'workflow_dispatch' || inputs.mode == 'publish') && steps.docker-status.outputs.exists != 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build amd64 release image rehearsal
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'rehearsal'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./release-source
          file: ./release-source/Dockerfile
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/runewarp-amd64.tar
          provenance: false

      - name: Build and push amd64 release image by digest
        if: (github.event_name != 'workflow_dispatch' || inputs.mode == 'publish') && steps.docker-status.outputs.exists != 'true'
        id: build-image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./release-source
          file: ./release-source/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ needs.gate.outputs.image_repository }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
  docker-release-arm64:
    name: Publish Docker Hub arm64 release
    needs:
      - gate
      - crate-release
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    environment: release
    permissions:
      contents: read
    outputs:
      docker_exists: ${{ steps.docker-status.outputs.exists }}
      image_digest: ${{ steps.build-image.outputs.digest }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.ref }}

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: release-source
          ref: ${{ needs.gate.outputs.release_source_ref }}

      - name: Set up Docker Buildx
        if: ${{ !cancelled() }}
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Check whether Docker release already exists
        id: docker-status
        if: github.event_name != 'workflow_dispatch' || inputs.mode == 'publish'
        env:
          RELEASE_VERSION: ${{ needs.gate.outputs.release_version }}
        run: |
          status_code="$(
            curl \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out '%{http_code}' \
              "https://hub.docker.com/v2/namespaces/runewarp/repositories/runewarp/tags/${RELEASE_VERSION}"
          )"
          case "$status_code" in
            200)
              printf 'exists=true\n' >> "$GITHUB_OUTPUT"
              ;;
            404)
              printf 'exists=false\n' >> "$GITHUB_OUTPUT"
              ;;
            *)
              printf 'error: failed to query Docker Hub tag %s: HTTP %s\n' "$RELEASE_VERSION" "$status_code" >&2
              exit 1
              ;;
          esac

      - name: Log in to Docker Hub
        if: (github.event_name != 'workflow_dispatch' || inputs.mode == 'publish') && steps.docker-status.outputs.exists != 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build arm64 release image rehearsal
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'rehearsal'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./release-source
          file: ./release-source/Dockerfile
          platforms: linux/arm64
          outputs: type=docker,dest=/tmp/runewarp-arm64.tar
          provenance: false

      - name: Build and push arm64 release image by digest
        if: (github.event_name != 'workflow_dispatch' || inputs.mode == 'publish') && steps.docker-status.outputs.exists != 'true'
        id: build-image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./release-source
          file: ./release-source/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ needs.gate.outputs.image_repository }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max

  docker-release-manifest:
    name: Publish Docker Hub release manifest
    if: github.event_name == 'push' || inputs.mode == 'publish'
    needs:
      - gate
      - docker-release-amd64
      - docker-release-arm64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up Docker Buildx
        if: ${{ !cancelled() }}
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        if: needs.docker-release-amd64.outputs.docker_exists != 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Merge manifest
        if: needs.docker-release-amd64.outputs.docker_exists != 'true'
        id: merge-manifest
        env:
          AMD64_DIGEST: ${{ needs.docker-release-amd64.outputs.image_digest }}
          ARM64_DIGEST: ${{ needs.docker-release-arm64.outputs.image_digest }}
          DOCKER_TAGS: ${{ needs.gate.outputs.docker_tags }}
          IMAGE_REPOSITORY: ${{ needs.gate.outputs.image_repository }}
          RELEASE_VERSION: ${{ needs.gate.outputs.release_version }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            tag_args+=("-t" "$tag")
          done <<< "$DOCKER_TAGS"

          docker buildx imagetools create \
            "${tag_args[@]}" \
            "${IMAGE_REPOSITORY}@${AMD64_DIGEST}" \
            "${IMAGE_REPOSITORY}@${ARM64_DIGEST}"

          manifest_digest="sha256:$(docker buildx imagetools inspect "${IMAGE_REPOSITORY}:${RELEASE_VERSION}" --raw | sha256sum | awk '{print $1}')"
          printf 'digest=%s\n' "$manifest_digest" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: needs.docker-release-amd64.outputs.docker_exists != 'true'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Sign released image
        if: needs.docker-release-amd64.outputs.docker_exists != 'true'
        env:
          IMAGE_REPOSITORY: ${{ needs.gate.outputs.image_repository }}
          IMAGE_DIGEST: ${{ steps.merge-manifest.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"

  github-release:
    name: Finalize GitHub release
    if: github.event_name == 'push' || inputs.mode == 'publish'
    needs:
      - gate
      - crate-release
      - docker-release-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.ref }}

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          path: release-source
          ref: ${{ needs.gate.outputs.release_source_ref }}

      - name: Render release notes
        run: ./scripts/render-release-notes.sh --version "${{ needs.gate.outputs.release_version }}" > /tmp/release-notes.md

      - name: Check whether GitHub release already exists
        id: github-release-status
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.gate.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            printf 'exists=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'exists=false\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.gate.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.gate.outputs.release_version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [[ "${{ steps.github-release-status.outputs.exists }}" == "true" ]]; then
            gh release edit "$RELEASE_TAG" \
              --repo "$REPOSITORY" \
              --latest \
              --title "$RELEASE_VERSION" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --repo "$REPOSITORY" \
              --verify-tag \
              --latest \
              --title "$RELEASE_VERSION" \
              --notes-file /tmp/release-notes.md
          fi
