services:
  server:
    image: runewarp-example:local
    command: ["server", "--config", "/runewarp/config/server.toml"]
    ports:
      - "8443:443/tcp"
    volumes:
      - ./generated/config/server.toml:/runewarp/config/server.toml:ro
      - ./generated/server-cert:/runewarp/server-cert:ro
    networks:
      default:
        aliases:
          - tunnel.example.test

  client:
    image: runewarp-example:local
    command: ["client", "--config", "/runewarp/config/client.toml"]
    depends_on:
      - server
      - caddy
    volumes:
      - ./generated/config/client.toml:/runewarp/config/client.toml:ro
      - ./generated/client-identity:/runewarp/client-identity:ro
      - ./generated/server-cert:/runewarp/server-cert:ro

  caddy:
    image: caddy:2.10
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./generated/caddy/data:/data
      - ./generated/caddy/config:/config
